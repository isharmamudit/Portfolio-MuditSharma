        <script>
            /* ── Advanced Space Engine: Unfold Animations, True Magnetic Buttons, Clean Particles ─ */
            (function () {
                var section = document.getElementById('galaxy-section');
                var canvas = document.getElementById('galaxy-canvas');
                var cursor = document.getElementById('galaxy-custom-cursor');
                var ctaWrapper = document.getElementById('galaxy-cta-wrapper');
                var ctaEl = document.getElementById('galaxy-cta');
                var btnWrap = document.getElementById('galaxy-btn-wrap');
                var btn = document.getElementById('galaxy-btn');
                var instruction = document.getElementById('galaxy-instruction');

                if (!canvas || !section) return;
                var ctx = canvas.getContext('2d', { alpha: false });

                // Unfold Animation via Intersection Observer
                if ('IntersectionObserver' in window) {
                    var obs = new IntersectionObserver(function (entries) {
                        if (entries[0].isIntersecting) {
                            ctaEl.classList.add('is-visible');
                        }
                    }, { threshold: 0.3 });
                    obs.observe(ctaEl);
                } else {
                    ctaEl.classList.add('is-visible');
                }

                var W, H;
                var stars = [], sparks = [], ripples = [], shooters = [];
                var mouse = { x: -9999, y: -9999, isDown: false, holdTime: 0 };
                var scrollY = 0;

                var LAYERS = [
                    { n: 250, rMin: 0.3, rMax: 1.0, aMin: 0.2, aMax: 0.5, drift: 0.02, p: 0.02, connect: 0 },
                    { n: 120, rMin: 1.0, rMax: 2.2, aMin: 0.4, aMax: 0.8, drift: 0.08, p: 0.10, connect: 0 },
                    { n: 60, rMin: 2.0, rMax: 3.5, aMin: 0.6, aMax: 1.0, drift: 0.15, p: 0.25, connect: 150 }
                ];

                function resize() {
                    W = canvas.width = section.offsetWidth;
                    H = canvas.height = section.offsetHeight;
                }
                function rand(a, b) { return a + Math.random() * (b - a); }

                function makeStar(layer) {
                    // Theme neutral colors: white, icy blue, slight warm gray
                    var hues = [210, 220, 200, 230, 0];
                    return {
                        ox: rand(0, W), oy: rand(0, H),
                        x: 0, y: 0,
                        vx: 0, vy: 0,
                        r: rand(layer.rMin, layer.rMax),
                        baseR: rand(layer.rMin, layer.rMax),
                        a: rand(layer.aMin, layer.aMax),
                        hue: hues[Math.floor(Math.random() * hues.length)],
                        sat: rand(0, 30), // low saturation
                        twinkle: rand(0, Math.PI * 2),
                        twinkleSpeed: rand(0.01, 0.05),
                        driftAngle: rand(0, Math.PI * 2),
                        driftSpeed: rand(0.01, layer.drift),
                        p: layer.p,
                        connect: layer.connect,
                        z: rand(0.1, 1)
                    };
                }

                function init() {
                    resize();
                    stars = [];
                    LAYERS.forEach(function (layer) {
                        for (var i = 0; i < layer.n; i++) {
                            var s = makeStar(layer);
                            s.x = s.ox; s.y = s.oy;
                            stars.push(s);
                        }
                    });
                }

                function animate() {
                    // Canvas Scroll Parallax
                    canvas.style.transform = `translateY(${scrollY * 0.3}px) scale(${1 + scrollY * 0.0003})`;

                    // Deep background
                    ctx.fillStyle = '#010205';
                    ctx.fillRect(0, 0, W, H);

                    // Sparkles (Cursor trail)
                    if (mouse.x !== -9999 && Math.random() < 0.6) {
                        sparks.push({
                            x: mouse.x + rand(-10, 10),
                            y: mouse.y + rand(-10, 10),
                            vx: rand(-2, 2), vy: rand(-2, 2),
                            life: 1,
                            hue: mouse.isDown ? 330 : 210
                        });
                    }
                    for (var i = 0; i < sparks.length; i++) {
                        var sp = sparks[i];
                        sp.x += sp.vx; sp.y += sp.vy;
                        sp.life -= 0.03;
                        if (sp.life <= 0) { sparks.splice(i, 1); i--; continue; }
                        ctx.beginPath();
                        ctx.arc(sp.x, sp.y, sp.life * 2, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${sp.hue}, 40%, 80%, ${sp.life})`;
                        ctx.fill();
                    }

                    // Shooting Stars
                    if (Math.random() < 0.02) {
                        shooters.push({
                            x: rand(0, W),
                            y: rand(0, H / 2),
                            vx: rand(15, 30) * (Math.random() > 0.5 ? 1 : -1),
                            vy: rand(5, 15),
                            life: 1
                        });
                    }
                    for (var i = 0; i < shooters.length; i++) {
                        var sh = shooters[i];
                        sh.x += sh.vx;
                        sh.y += sh.vy;
                        sh.life -= 0.02;
                        if (sh.life <= 0) { shooters.splice(i, 1); i--; continue; }
                        ctx.beginPath();
                        ctx.moveTo(sh.x, sh.y);
                        ctx.lineTo(sh.x - sh.vx * 3, sh.y - sh.vy * 3);
                        var grad = ctx.createLinearGradient(sh.x, sh.y, sh.x - sh.vx * 3, sh.y - sh.vy * 3);
                        grad.addColorStop(0, `rgba(255, 255, 255, ${sh.life})`);
                        grad.addColorStop(1, `rgba(255, 255, 255, 0)`);
                        ctx.strokeStyle = grad;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }

                    // Ripples (Shockwaves)
                    for (var i = 0; i < ripples.length; i++) {
                        var rp = ripples[i];
                        rp.r += rp.vr;
                        rp.life -= 0.02;
                        if (rp.life <= 0) { ripples.splice(i, 1); i--; continue; }
                        ctx.beginPath();
                        ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${rp.life * 0.3})`;
                        ctx.lineWidth = 10 * rp.life;
                        ctx.stroke();
                    }

                    // Black Hole Logic
                    if (mouse.isDown) mouse.holdTime = Math.min(mouse.holdTime + 0.02, 1);
                    else mouse.holdTime = Math.max(mouse.holdTime - 0.05, 0);

                    var cx = W / 2, cy = H / 2;
                    var connectableStars = [];

                    /* Stars */
                    for (var i = 0; i < stars.length; i++) {
                        var p = stars[i];

                        p.driftAngle += 0.002;
                        p.ox += Math.cos(p.driftAngle) * p.driftSpeed;
                        p.oy += Math.sin(p.driftAngle) * p.driftSpeed;

                        var margin = 100;
                        if (p.ox < -margin) p.ox = W + margin;
                        if (p.ox > W + margin) p.ox = -margin;
                        if (p.oy < -margin) p.oy = H + margin;
                        if (p.oy > H + margin) p.oy = -margin;

                        var px = p.ox, py = p.oy;

                        // Parallax
                        if (mouse.x !== -9999) {
                            px += (cx - mouse.x) * p.p;
                            py += (cy - mouse.y) * p.p;
                        }

                        // Gravity Well (Black Hole) vs Shockwave vs Normal
                        if (mouse.holdTime > 0 && mouse.x !== -9999) {
                            var dxB = p.x - mouse.x;
                            var dyB = p.y - mouse.y;
                            var distB = Math.sqrt(dxB * dxB + dyB * dyB);
                            if (distB < 400 && distB > 20) {
                                // Suck in and spiral
                                var force = (400 - distB) / 400 * mouse.holdTime;
                                p.vx -= (dxB / distB) * force * 2;
                                p.vy -= (dyB / distB) * force * 2;
                                p.vx += (dyB / distB) * force * 3;
                                p.vy -= (dxB / distB) * force * 3;
                            }
                        } else {
                            // Repel ripple effect
                            for (var k = 0; k < ripples.length; k++) {
                                var rp = ripples[k];
                                var dxR = p.x - rp.x;
                                var dyR = p.y - rp.y;
                                var distR = Math.sqrt(dxR * dxR + dyR * dyR);
                                if (Math.abs(distR - rp.r) < 30) {
                                    p.vx += (dxR / distR) * 15 * rp.life;
                                    p.vy += (dyR / distR) * 15 * rp.life;
                                }
                            }

                            // Spring back slowly
                            p.vx += (px - p.x) * 0.05;
                            p.vy += (py - p.y) * 0.05;
                        }

                        p.vx *= 0.85; p.vy *= 0.85;
                        p.x += p.vx; p.y += p.vy;

                        p.twinkle += p.twinkleSpeed;
                        var alpha = p.a * (0.3 + 0.7 * Math.abs(Math.sin(p.twinkle)));

                        // Stars stretch when moving fast
                        var speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                        if (speed > 2) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p.x - p.vx * 1.5, p.y - p.vy * 1.5);
                            ctx.lineWidth = p.r * 1.5;
                            ctx.strokeStyle = `hsla(${p.hue}, ${p.sat}%, 80%, ${alpha})`;
                            ctx.stroke();
                        } else {
                            if (p.r > 1.5) {
                                ctx.shadowBlur = 10;
                                ctx.shadowColor = `hsla(${p.hue}, ${p.sat}%, 80%, ${alpha})`;
                            }
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                            ctx.fillStyle = `hsla(${p.hue}, ${p.sat}%, 90%, ${alpha})`;
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }

                        if (p.connect > 0) connectableStars.push(p);
                    }

                    // Constellations
                    ctx.lineWidth = 0.5;
                    for (var i = 0; i < connectableStars.length; i++) {
                        var s1 = connectableStars[i];
                        var dMouse = mouse.x !== -9999 ? Math.sqrt(Math.pow(s1.x - mouse.x, 2) + Math.pow(s1.y - mouse.y, 2)) : 9999;
                        if (dMouse > 250) continue;

                        for (var j = i + 1; j < connectableStars.length; j++) {
                            var s2 = connectableStars[j];
                            var dist = Math.sqrt(Math.pow(s1.x - s2.x, 2) + Math.pow(s1.y - s2.y, 2));
                            if (dist < s1.connect) {
                                var a = (1 - dist / s1.connect) * 0.5;
                                a *= Math.max(0, 1 - dMouse / 250);
                                ctx.beginPath();
                                ctx.moveTo(s1.x, s1.y);
                                ctx.lineTo(s2.x, s2.y);
                                ctx.strokeStyle = `rgba(255, 255, 255, ${a})`;
                                ctx.stroke();
                            }
                        }
                    }

                }

                    mouse.x = e.clientX - r.left;
                    mouse.y = e.clientY - r.top;

                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';

                    // 3D Tilt CTA Wrapper
                    var cx = r.width / 2;
                    var cy = r.height / 2;
                    var rotX = (mouse.y - cy) / cy * -20;
                    var rotY = (mouse.x - cx) / cx * 20;
                    ctaWrapper.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(20px)`;

                    // Dynamic text shadow
                    var shadowX = (mouse.x - cx) * 0.05;
                    var shadowY = (mouse.y - cy) * 0.05;
                    var h2 = ctaEl.querySelector('h2');
                    if (h2) h2.style.textShadow = `${shadowX}px ${shadowY}px 20px rgba(255, 255, 255, 0.4)`;
                });

                section.addEventListener('mouseenter', function () {
                    cursor.style.opacity = 1;
                });
                section.addEventListener('mouseleave', function () {
                    mouse.x = -9999; mouse.y = -9999; mouse.isDown = false;
                    cursor.style.opacity = 0;
                    cursor.classList.remove('blackhole');
                    ctaWrapper.style.transform = `rotateX(0deg) rotateY(0deg) translateZ(0px)`;
                });
                section.addEventListener('mousedown', function () {
                    mouse.isDown = true;
                    cursor.classList.add('blackhole');
                    instruction.style.opacity = 0;
                });
                section.addEventListener('mouseup', function () {
                    mouse.isDown = false;

                    if (mouse.x !== -9999) ripples.push({ x: mouse.x, y: mouse.y, r: 10, vr: 15, life: 1 });
                });

                window.addEventListener('scroll', function () {
                    var r = section.getBoundingClientRect();
                    if (r.bottom > 0 && r.top < window.innerHeight) {

                    }
                });

                    var bx = e.clientX - rect.left;
                    var by = e.clientY - rect.top;

                    var centerX = rect.width / 2;
                    var centerY = rect.height / 2;

                    // Calculate pull distance
                    var moveX = (bx - centerX) * 0.6; // Strong pull
                    var moveY = (by - centerY) * 0.6;

                    btn.style.transform = `translateZ(60px) translate(${moveX}px, ${moveY}px)`;
                });
                btnWrap.addEventListener('mouseleave', function () {
                    btn.style.transform = `translateZ(60px) translate(0px, 0px)`;
                });

                window.addEventListener('resize', resize);

                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', function () { init(); animate(); });
                } else { init(); animate(); }
            })();
        </script>

<!-- Contact form mailto interceptor -->
<script>
    (function () {
        // Wait for the 3D engine to attach its listener, then override it
        window.addEventListener('load', function () {
            setTimeout(function () {
                var btn = document.getElementById('contact-submit-button');
                if (!btn) return;
                // Clone button to strip existing listeners attached by index.js
                var newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                newBtn.addEventListener('click', function () {
                    var name = (document.getElementById('contact-name-input-field') || {}).value || '';
                    var email = (document.getElementById('contact-email-input-field') || {}).value || '';
                    var message = (document.getElementById('contact-message-input-field') || {}).value || '';

                    // Basic validation
                    if (name.trim().length < 4) {
                        alert('Please enter your name (at least 4 characters).');
                        return;
                    }
                    if (!/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(email)) {
                        alert('Please enter a valid email address.');
                        return;
                    }
                    if (message.trim().length < 10) {
                        alert('Please enter a message (at least 10 characters).');
                        return;
                    }

                    var subject = encodeURIComponent('Portfolio Contact from ' + name);
                    var body = encodeURIComponent(
                        'Name: ' + name + '\n' +
                        'Email: ' + email + '\n\n' +
                        'Message:\n' + message
                    );
                    window.location.href = 'mailto:isharmamudit@gmail.com?subject=' + subject + '&body=' + body;
                });
            }, 2000); // wait for index.js to initialise
        });
    })();
</script>
<!-- Resume download handler – must use capture phase to beat the 3D engine -->
<script>
    window.addEventListener('load', function () {
        var btn = document.getElementById('landing-resume-button');
        if (!btn) return;
        btn.addEventListener('click', function (e) {
            e.stopImmediatePropagation();
            e.stopPropagation();
            e.preventDefault();
            var a = document.createElement('a');
            a.href = '/muditcv.pdf';
            a.download = 'Mudit Sharma CV.pdf';
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }, true); // capture phase – fires before engine handlers
    });
</script>
