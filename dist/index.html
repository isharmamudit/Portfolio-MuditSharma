        <script>
        /* ── Full-canvas galaxy field: layered depth, drift, shooting stars ─ */
        (function () {
            var canvas = document.getElementById('galaxy-canvas');
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            var W, H;
            var stars = [], shooters = [];
            var mouse = { x: -9999, y: -9999 };

            /* Layer config: [count, sizeRange, alphaRange, driftSpeed, repelMultiplier] */
            var LAYERS = [
                { n: 260, rMin: 0.3, rMax: 1.2, aMin: 0.15, aMax: 0.55, drift: 0.06, rp: 0.5 },  /* far  */
                { n: 180, rMin: 0.8, rMax: 1.8, aMin: 0.35, aMax: 0.75, drift: 0.14, rp: 1.0 },  /* mid  */
                { n:  80, rMin: 1.4, rMax: 3.0, aMin: 0.55, aMax: 0.95, drift: 0.26, rp: 1.8 }   /* near */
            ];
            var REPEL_R = 160, REPEL_F = 10;

            function resize() {
                W = canvas.width  = canvas.offsetWidth;
                H = canvas.height = canvas.offsetHeight;
            }

            function rand(a, b) { return a + Math.random() * (b - a); }

            function makeStar(layer) {
                var hues = [210, 220, 200, 240, 180, 35, 50]; /* blue-white + warm accents */
                return {
                    ox: rand(0, W), oy: rand(0, H),
                    x: 0, y: 0,
                    vx: 0, vy: 0,
                    r:   rand(layer.rMin, layer.rMax),
                    a:   rand(layer.aMin, layer.aMax),
                    hue: hues[Math.floor(Math.random() * hues.length)],
                    twinkle:      rand(0, Math.PI * 2),
                    twinkleSpeed: rand(0.012, 0.045),
                    /* slow autonomous drift */
                    driftAngle: rand(0, Math.PI * 2),
                    driftSpeed: rand(0.01, layer.drift),
                    rp: layer.rp
                };
            }

            function makeShooter() {
                return {
                    x:  rand(0, W), y: rand(-20, H * 0.4),
                    vx: rand(3, 7),  vy: rand(2, 5),
                    len: rand(60, 140),
                    a:  rand(0.4, 0.9),
                    life: 1
                };
            }

            function init() {
                resize();
                stars = [];
                LAYERS.forEach(function(layer) {
                    for (var i = 0; i < layer.n; i++) {
                        var s = makeStar(layer);
                        s.x = s.ox; s.y = s.oy;
                        stars.push(s);
                    }
                });
            }

            /* Nebula glow blobs drawn behind stars */
            function drawNebula() {
                var blobs = [
                    { x: W * 0.25, y: H * 0.3,  r: W * 0.28, h: 210, a: 0.04 },
                    { x: W * 0.75, y: H * 0.65, r: W * 0.22, h: 260, a: 0.05 },
                    { x: W * 0.5,  y: H * 0.5,  r: W * 0.18, h: 190, a: 0.03 }
                ];
                blobs.forEach(function(b) {
                    var g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
                    g.addColorStop(0,   'hsla(' + b.h + ',70%,55%,' + b.a + ')');
                    g.addColorStop(1,   'hsla(' + b.h + ',70%,30%,0)');
                    ctx.fillStyle = g;
                    ctx.fillRect(0, 0, W, H);
                });
            }

            function animate() {
                ctx.clearRect(0, 0, W, H);
                drawNebula();

                /* Shooting stars */
                if (Math.random() < 0.004) shooters.push(makeShooter());
                shooters = shooters.filter(function(s) {
                    s.x += s.vx; s.y += s.vy; s.life -= 0.018;
                    if (s.life <= 0) return false;
                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y);
                    ctx.lineTo(s.x - s.vx * (s.len / 10), s.y - s.vy * (s.len / 10));
                    ctx.strokeStyle = 'rgba(255,255,255,' + (s.a * s.life) + ')';
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                    return true;
                });

                /* Stars */
                for (var i = 0; i < stars.length; i++) {
                    var p = stars[i];

                    /* Autonomous drift (changes direction slowly) */
                    p.driftAngle += 0.005;
                    p.ox += Math.cos(p.driftAngle) * p.driftSpeed;
                    p.oy += Math.sin(p.driftAngle) * p.driftSpeed;
                    /* Wrap around edges */
                    if (p.ox < 0) p.ox = W; if (p.ox > W) p.ox = 0;
                    if (p.oy < 0) p.oy = H; if (p.oy > H) p.oy = 0;

                    /* Repel from mouse */
                    var dx = p.x - mouse.x, dy = p.y - mouse.y;
                    var d  = Math.sqrt(dx * dx + dy * dy);
                    if (d < REPEL_R && d > 0) {
                        var f = (REPEL_R - d) / REPEL_R * REPEL_F * p.rp;
                        p.vx += (dx / d) * f;
                        p.vy += (dy / d) * f;
                    }

                    /* Spring back to drifting origin */
                    p.vx += (p.ox - p.x) * 0.07;
                    p.vy += (p.oy - p.y) * 0.07;
                    p.vx *= 0.80; p.vy *= 0.80;
                    p.x  += p.vx; p.y  += p.vy;

                    /* Twinkle */
                    p.twinkle += p.twinkleSpeed;
                    var alpha = p.a * (0.55 + 0.45 * Math.sin(p.twinkle));

                    /* Glow for brighter near-layer stars */
                    if (p.r > 1.8) {
                        ctx.shadowBlur  = 8;
                        ctx.shadowColor = 'hsla(' + p.hue + ',90%,90%,0.6)';
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'hsla(' + p.hue + ',80%,92%,' + alpha + ')';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                requestAnimationFrame(animate);
            }

            canvas.addEventListener('mousemove', function(e) {
                var r = canvas.getBoundingClientRect();
                mouse.x = e.clientX - r.left;
                mouse.y = e.clientY - r.top;
            });
            canvas.addEventListener('mouseleave', function() { mouse.x = -9999; mouse.y = -9999; });
            window.addEventListener('resize', function() {
                resize();
                stars.forEach(function(s) { s.ox = rand(0, W); s.oy = rand(0, H); s.x = s.ox; s.y = s.oy; });
            });

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() { init(); animate(); });
            } else { init(); animate(); }
        })();
        </script>

<!-- Contact form mailto interceptor -->
<script>
    (function () {
        // Wait for the 3D engine to attach its listener, then override it
        window.addEventListener('load', function () {
            setTimeout(function () {
                var btn = document.getElementById('contact-submit-button');
                if (!btn) return;
                // Clone button to strip existing listeners attached by index.js
                var newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                newBtn.addEventListener('click', function () {
                    var name = (document.getElementById('contact-name-input-field') || {}).value || '';
                    var email = (document.getElementById('contact-email-input-field') || {}).value || '';
                    var message = (document.getElementById('contact-message-input-field') || {}).value || '';

                    // Basic validation
                    if (name.trim().length < 4) {
                        alert('Please enter your name (at least 4 characters).');
                        return;
                    }
                    if (!/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(email)) {
                        alert('Please enter a valid email address.');
                        return;
                    }
                    if (message.trim().length < 10) {
                        alert('Please enter a message (at least 10 characters).');
                        return;
                    }

                    var subject = encodeURIComponent('Portfolio Contact from ' + name);
                    var body = encodeURIComponent(
                        'Name: ' + name + '\n' +
                        'Email: ' + email + '\n\n' +
                        'Message:\n' + message
                    );
                    window.location.href = 'mailto:isharmamudit@gmail.com?subject=' + subject + '&body=' + body;
                });
            }, 2000); // wait for index.js to initialise
        });
    })();
</script>
<!-- Resume download handler – must use capture phase to beat the 3D engine -->
<script>
    window.addEventListener('load', function () {
        var btn = document.getElementById('landing-resume-button');
        if (!btn) return;
        btn.addEventListener('click', function (e) {
            e.stopImmediatePropagation();
            e.stopPropagation();
            e.preventDefault();
            var a = document.createElement('a');
            a.href = '/muditcv.pdf';
            a.download = 'Mudit Sharma CV.pdf';
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }, true); // capture phase – fires before engine handlers
    });
</script>
